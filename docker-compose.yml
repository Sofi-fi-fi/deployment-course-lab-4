version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: task_db
    environment:
      POSTGRES_DB: mywebapp
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp
    volumes:
      - pgdata:/var/lib/postgresql/data      
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - task_network
    restart: unless-stopped

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_webapp
    volumes:
      - ./config/config.docker.json:/etc/mywebapp/config.json:ro
    depends_on:
      - db
    networks:
      - task_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: task_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/mywebapp.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - task_network
    restart: unless-stopped

networks:
  task_network:
    driver: bridge

volumes:
  pgdata: